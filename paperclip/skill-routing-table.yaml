# Skill OS × Paperclip — Default Skill Routing Table
# Version: 1.0
#
# Maps Paperclip issue labels to Skill OS skill paths.
# Covers the 40 most common task types across all major Paperclip roles.
#
# HOW TO USE:
#   1. Create the labels listed here in your Paperclip company (Settings → Labels)
#   2. Update skill_os_root to match your local Skill OS clone path
#   3. When creating a task, apply the relevant label
#   4. Set the matched agent's instructionsFilePath to the corresponding skill_path
#
# VALIDATION:
#   Verify all skill_path values resolve to existing files:
#     cd <skill_os_root>
#     python3 scripts/validate.py
#   Then spot-check a few paths:
#     ls agents/product/product-manager/requirements-extractor/SKILL.md
#
# VERSIONING (production best practice):
#   Pin skill_version to a git SHA for stable production configs:
#     skill_version: "a1b2c3d"   # git rev-parse --short HEAD
#   Omit or set to null for always-latest (development).
#
# MATCHING LOGIC:
#   role + IssueLabel.name → first matching binding wins
#   If no match: fallback_ethos is used (or nothing if null)

version: "1.0"
skill_os_root: "./skill-os"    # ← update to your Skill OS clone path
default_fallback: null

bindings:


# Skill OS × Paperclip — Full-Company Example
#
# A 7-agent company spanning all major Paperclip roles.
# Covers executive leadership, product, engineering, design, and go-to-market.
#
# Use this as a starting point for a full-company Paperclip setup.
# Strip out agents you don't need, add role instances for larger teams.
#
# Prerequisites:
#   - Skill OS cloned at ../skill-os
#   - All instructionsFilePath values adjusted to your actual Skill OS path
#
# Issue labels to create in Paperclip for this team:
#   ceo:      roadmap, strategy
#   cto:      system-design, adr, architecture-review
#   cmo:      gtm, content, campaign, press-release
#   cfo:      forecast, unit-economics, investor-update
#   pm:       prd, user-story, experiment, sprint-planning
#   engineer: backend-api, code-review, threat-model
#   designer: wireframe, usability-review, user-research

agents:

  - name: "Alex (CEO)"
    role: ceo
    title: "Chief Executive Officer"
    capabilities: |
      Sets company direction, owns roadmap strategy, approves major initiatives.
      Grounded in Skill OS prd-assembler skill for vp-product.
    budgetMonthlyCents: 15000   # $150/month — complex strategic decisions

    adapterType: claude_local
    adapterConfig:
      cwd: "/path/to/company-repo"
      model: claude-opus-4-6    # Strategic L3 skill — use strongest model
      instructionsFilePath: "/path/to/skill-os/agents/product/vp-product/prd-assembler/SKILL.md"
      promptTemplate: |
        You are {{agent.title}} at {{company.name}}.
        Task: {{issue.title}} ({{issue.identifier}}) | Priority: {{issue.priority}}

        Fetch full context: GET /api/issues/{{issue.id}}/heartbeat-context
        Review the goal hierarchy for strategic alignment before proceeding.
        Then follow the workflow in your skill instructions.

        When you reach a step marked [GATE]:
        Post your output as an issue comment, create a Paperclip approval request,
        set issue status to "blocked", and stop until approved.
      maxTurnsPerRun: 30

